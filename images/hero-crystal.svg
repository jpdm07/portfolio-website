<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" width="280" height="320" aria-hidden="true">
  <defs>
    <linearGradient id="body" x1="22%" y1="5%" x2="78%" y2="95%">
      <stop offset="0%" stop-color="#fefcfe"/>
      <stop offset="28%" stop-color="#ddd6fe"/>
      <stop offset="55%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#1e0a3a"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="22%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="b"/>
      <feFlood flood-color="#ede9fe" flood-opacity="0.35" result="f"/>
      <feComposite in="f" in2="b" operator="in" result="o"/>
      <feMerge><feMergeNode in="o"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="140" cy="298" rx="42" ry="5" fill="#000000" opacity="0.28"/>
  <g filter="url(#glow)">
    <polygon fill="url(#body)" stroke="rgba(255,255,255,0.28)" stroke-width="0.75" stroke-linejoin="round"
      points="140,28 86,56 58,118 72,198 120,272 176,262 220,192 226,106 192,46 156,34"/>
    <ellipse cx="108" cy="102" rx="36" ry="48" fill="url(#shine)" transform="rotate(-20 108 102)" opacity="0.75"/>
  </g>
</svg>
